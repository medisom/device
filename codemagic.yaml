workflows:
  ios_testflight:
    name: iOS TestFlight (release/ios)
    max_build_duration: 90
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release/ios
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      groups:
        - medisom_group
        - app_store_connect
      vars:
        BUNDLE_ID: com.medisom.app.device
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files (App Store)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
      - name: Set up code signing in Xcode project
        script: xcode-project use-profiles
      - name: Build IPA (App Store / TestFlight)
        script: |
          flutter --version
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      - name: Publish to TestFlight
        script: |
          # Publishes the generated IPA to TestFlight using the connected
          # App Store Connect integration in Codemagic UI.
          app-store-connect publish --path build/ios/ipa/*.ipa \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - flutter_drive.log
