workflows:
  ios_testflight:
    name: iOS TestFlight (release/ios)
    max_build_duration: 90
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release/ios
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      groups:
        - medisom_group
        - app_store_connect
      vars:
        BUNDLE_ID: com.medisom.app.device

      ios_signing:
        distribution_type: app_store
        bundle_identifier:  com.medisom.app.device

scripts:
  - name: Flutter pub get
    script: flutter pub get

  - name: Flutter analyze
    script: flutter analyze

  - name: Initialize keychain
    script: keychain initialize

  - name: Set up code signing in Xcode project
    script: xcode-project use-profiles

  - name: Create ExportOptions.plist
    script: |
      cat > $HOME/export_options.plist << 'EOF'
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>method</key>
        <string>app-store</string>
        <key>uploadBitcode</key>
        <false/>
        <key>uploadSymbols</key>
        <true/>
        <key>compileBitcode</key>
        <false/>
        <key>signingStyle</key>
        <string>automatic</string>
      </dict>
      </plist>
      EOF

      /usr/libexec/PlistBuddy -c "Print" "$HOME/export_options.plist"

  - name: Build IPA (App Store / TestFlight)
    script: |
      set -e
      flutter --version

      flutter build ipa --release --export-options-plist=$HOME/export_options.plist

      echo "=== Listing build/ios/ipa ==="
      ls -la build/ios/ipa || true
      echo "=== Finding any .ipa under build/ios ==="
      find build/ios -name "*.ipa" -maxdepth 5 -print || true

  - name: "Debug: list iOS build outputs"
    script: |
      echo "=== build/ios ==="
      ls -la build/ios || true
      echo "=== build/ios/ipa ==="
      ls -la build/ios/ipa || true
      echo "=== find ipa ==="
      find build -maxdepth 5 -name "*.ipa" || true


  - name: Publish to TestFlight
    script: |
      set -e
      IPA_PATH="$(find build/ios -name '*.ipa' -maxdepth 5 -print -quit)"

      if [ -z "$IPA_PATH" ]; then
        echo "ERROR: No .ipa found under build/ios. Dumping build tree:"
        find build/ios -maxdepth 4 -print || true
        exit 1
      fi

      echo "Publishing IPA at: $IPA_PATH"

      app-store-connect publish --path "$IPA_PATH" \
        --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
        --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
        --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"


artifacts:
  - build/ios/ipa/*.ipa
  - build/ios/ipa/**/*.ipa
  - build/ios/archive/*.xcarchive
  - build/ios/archive/**/*.xcarchive
  - flutter_drive.log

