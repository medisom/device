workflows:
  ios_testflight:
    name: iOS TestFlight (release/ios)
    max_build_duration: 90
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release/ios
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      groups:
        - medisom_group
        - app_store_connect
      vars:
        BUNDLE_ID: com.medisom.app.device
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.medisom.app.device

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Flutter analyze
        script: |
          flutter analyze

      - name: Set up code signing in Xcode project
        script: |
          xcode-project use-profiles

      - name: Create ExportOptions.plist
        script: |
          cat > $HOME/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          /usr/libexec/PlistBuddy -c "Print" "$HOME/export_options.plist"

      - name: Build IPA
        script: |
          set -e
          flutter pub get
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist

      - name: Debug build outputs
        script: |
          echo "=== build/ios ==="
          ls -la build/ios || true
          echo "=== build/ios/ipa ==="
          ls -la build/ios/ipa || true
          echo "=== find ipa ==="
          find build -maxdepth 5 -name "*.ipa" || true

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
