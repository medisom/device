name: medisom_device
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ^3.6.0
dependencies:
  http: ^1.0.0
  permission_handler: ^12.0.0
  universal_ble: ^1.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^16.2.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_orelha_icon.png
  adaptive_icon_background: "#F2F3F5"
  adaptive_icon_foreground: assets/images/logo_orelha_icon.png
  # Ajuda a reduzir o "zoom" do foreground em alguns launchers Android.
  # (Ainda mantemos o ajuste via XML para garantir efeito imediato.)
  adaptive_icon_foreground_inset: 18
  remove_alpha_ios: true
